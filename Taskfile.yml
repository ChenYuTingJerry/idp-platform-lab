# idp-platform-lab — development task runner.
# All versions pinned. Usage: task up, task down, task status
version: "3"

vars:
  CLUSTER_NAME: idp
  K3S_IMAGE: rancher/k3s:v1.31.14-k3s1
  ARGOCD_CHART_VERSION: "9.5.7"
  ARGOCD_NAMESPACE: argocd
  CERT_MANAGER_VERSION: "v1.16.2"

tasks:
  up:
    desc: Create k3d cluster + registry, install cert-manager and ArgoCD, wait for ready
    cmds:
      - task: up:cluster
      - task: up:certmanager
      - task: up:argocd

  up:certmanager:
    desc: Install cert-manager (signs the validating webhook's serving cert), idempotent
    status:
      - kubectl get deployment cert-manager-webhook -n cert-manager >/dev/null 2>&1
    cmds:
      - echo "Installing cert-manager {{.CERT_MANAGER_VERSION}}..."
      - kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/{{.CERT_MANAGER_VERSION}}/cert-manager.yaml
      - kubectl wait --for=condition=available deployment --all -n cert-manager --timeout=300s
      - echo "cert-manager is ready."

  up:cluster:
    desc: Create k3d cluster and registry (idempotent)
    status:
      - k3d cluster list -o json | grep -q '"name":"{{.CLUSTER_NAME}}"'
    cmds:
      - echo "Creating k3d cluster '{{.CLUSTER_NAME}}'..."
      - k3d cluster create --config infra/k3d-config.yaml
      - echo "Cluster '{{.CLUSTER_NAME}}' created."

  up:argocd:
    desc: Install ArgoCD via Kustomize + Helm (idempotent)
    cmds:
      - kubectl create namespace {{.ARGOCD_NAMESPACE}} --dry-run=client -o yaml | kubectl apply -f -
      - kustomize build infra/argocd --enable-helm | kubectl apply --server-side --force-conflicts -f -
      - echo "Waiting for ArgoCD deployments..."
      - kubectl wait --for=condition=available deployment --all -n {{.ARGOCD_NAMESPACE}} --timeout=300s
      - echo "ArgoCD is ready."

  down:
    desc: Delete k3d cluster and registry
    status:
      - "! k3d cluster list -o json | grep -q '\"name\":\"{{.CLUSTER_NAME}}\"'"
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}}

  build:
    desc: Build the idp-platform-lab controller binary (delegates to Makefile)
    cmds:
      - make build

  deploy:
    desc: Build, push, and deploy the controller image to the cluster
    vars:
      IMG: '{{.IMG | default "k3d-idp-registry:5050/idp-controller:0.1.0-m1"}}'
    cmds:
      - make docker-build IMG={{.IMG}}
      - make docker-push IMG={{.IMG}}
      - make deploy IMG={{.IMG}}

  # Daily controller-dev targets. Thin wrappers over the kubebuilder Makefile so
  # `task` is the single entry point. Rare or internal make targets (codegen
  # tooling, installers) are reached through `task make -- <target>` below.
  test:
    desc: Run controller integration tests with envtest (delegates to Makefile)
    cmds:
      - make test

  manifests:
    desc: Regenerate CRD and RBAC manifests from Go types (delegates to Makefile)
    cmds:
      - make manifests

  generate:
    desc: Regenerate DeepCopy code from Go types (delegates to Makefile)
    cmds:
      - make generate

  lint:
    desc: Run golangci-lint (delegates to Makefile)
    cmds:
      - make lint

  run:
    desc: Run the controller from the host against the current kube context (delegates to Makefile)
    cmds:
      - make run

  make:
    desc: 'Passthrough to the kubebuilder Makefile, e.g. task make -- build-installer'
    cmds:
      - make {{.CLI_ARGS}}

  status:
    desc: Show all pods across all namespaces
    cmds:
      - kubectl get pods -A
