# A team declares its allocation once. The controller turns this Tenant into a
# team-<name> namespace, a RoleBinding (team group -> edit), and a ResourceQuota
# built from the resources block. The Tenant name is the team name, so there is
# one Tenant per team. Services are declared separately as ServiceClaims that
# reference this Tenant by name (see ADR-010).
apiVersion: platform.idp.io/v1alpha1
kind: Tenant
metadata:
  labels:
    app.kubernetes.io/name: idp
    app.kubernetes.io/managed-by: kustomize
  name: payments
spec:
  # Totals for the namespace. cpu becomes requests.cpu (workloads may burst);
  # memory becomes requests.memory and limits.memory (memory is incompressible);
  # pods caps the pod count.
  resources:
    cpu: "2"
    memory: 4Gi
    pods: 10
